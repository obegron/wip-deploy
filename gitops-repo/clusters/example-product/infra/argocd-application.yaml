apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: product-example-infra
  namespace: argocd
spec:
  project: default
  destination:
    name: in-cluster
    namespace: product-example
  source:
    repoURL: https://git.example.com/platform/gitops-repo.git
    targetRevision: main
    path: clusters/example-product/infra
    kustomize:
      buildOptions: "--enable-helm"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
