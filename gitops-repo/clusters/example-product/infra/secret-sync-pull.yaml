apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-sync-pull
  namespace: product-example
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-sync-pull
  namespace: product-example
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-sync-pull
  namespace: product-example
subjects:
  - kind: ServiceAccount
    name: secret-sync-pull
    namespace: product-example
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secret-sync-pull
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-sync-pull
  namespace: product-example
  labels:
    app.kubernetes.io/name: secret-sync-pull
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: secret-sync-pull
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secret-sync-pull
    spec:
      serviceAccountName: secret-sync-pull
      containers:
        - name: secret-sync-controller
          image: docker.io/obegron/secret-sync-controller:0.2.0
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SYNC_MODE
              value: pull
            - name: SOURCE_NAMESPACE
              value: "product-example"
            - name: TARGET_NAMESPACE
              value: "product-example"
            - name: HOST_API_SERVER
              value: ""
            - name: HOST_TOKEN_FILE
              value: "/var/run/secrets/kubernetes.io/serviceaccount/token"
            - name: HOST_CA_FILE
              value: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
            - name: TENANT_SAFE_MODE
              value: "true"
            - name: DEFAULT_DELETE_POLICY
              value: "delete"
            - name: METRICS_BIND_ADDRESS
              value: ":8080"
            - name: OIDC_ISSUER_URL
              value: "https://oidc.dev01.company.example"
            - name: OIDC_JWKS_URL
              value: "https://oidc.dev01.company.example/openid/v1/jwks"
            - name: OIDC_AUDIENCE
              value: "secret-sync"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
