apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: product-example-apps
  namespace: argocd
spec:
  project: default
  destination:
    name: vcluster-example-product
    namespace: default
  source:
    repoURL: <gitops-repo-url>
    targetRevision: <gitops-branch>
    path: clusters/example-product/apps
    kustomize:
      buildOptions: "--enable-helm"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
